<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Calorie Log">
<meta name="theme-color" content="#f5f1ea">
<title>Calorie Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #f5f1ea;
    font-family: 'Fraunces', Georgia, serif;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  body {
    padding: max(env(safe-area-inset-top), 16px) 16px max(env(safe-area-inset-bottom), 24px);
  }
  .container { max-width: 560px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
    padding-top: 8px;
  }
  .date-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a7e6d;
    margin-bottom: 4px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 38px;
    margin: 0;
    letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144;
    line-height: 1;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid #d4ccbd;
    color: #8a7e6d;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 7px 12px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .reset-btn:active { background: #ebe4d3; }

  .summary {
    background: #fff;
    border: 1px solid #e8e0d0;
    border-radius: 10px;
    padding: 20px 22px 16px;
    margin-bottom: 18px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 14px;
    gap: 12px;
  }
  .big-num {
    font-family: 'Fraunces', serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.03em;
    font-variation-settings: "opsz" 144;
    color: #1a1a1a;
    display: inline-block;
  }
  .big-num.over { color: #c4604a; }
  .slash-goal {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #8a7e6d;
    margin-left: 6px;
  }
  .remaining-box { text-align: right; }
  .remaining-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a7e6d;
    margin-bottom: 2px;
  }
  .remaining-num {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: #3a7a4a;
  }
  .remaining-num.over { color: #c4604a; }
  .bar-track {
    width: 100%;
    height: 6px;
    background: #f0eadb;
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: #d97757;
    width: 0%;
    transition: width 0.4s ease, background 0.2s ease;
  }
  .bar-fill.over { background: #c4604a; }

  .meal-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .meal-card {
    background: #fff;
    border: 1px solid #e8e0d0;
    border-radius: 10px;
    padding: 16px 18px;
  }
  .meal-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .meal-name {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 21px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .meal-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 600;
  }
  .entries-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .entries-row:empty { display: none; }
  .entry-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: #f5f1ea;
    border: 1px solid #e8e0d0;
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    -webkit-user-select: none;
  }
  .entry-chip:active { background: #ebe4d3; }
  .entry-chip .x {
    color: #c4604a;
    opacity: 0.5;
    font-size: 14px;
    line-height: 1;
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  .meal-input {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; /* 16px prevents iOS zoom on focus */
    padding: 11px 12px;
    background: #faf6ed;
    border: 1px solid #e8e0d0;
    border-radius: 6px;
    color: #1a1a1a;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s, background 0.15s;
    min-width: 0;
  }
  .meal-input:focus {
    outline: none;
    border-color: #d97757;
    background: #fff;
  }
  .meal-input::-webkit-outer-spin-button,
  .meal-input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .add-btn {
    background: #d97757;
    color: #fff;
    border: none;
    border-radius: 6px;
    width: 48px;
    font-size: 24px;
    font-weight: 400;
    cursor: pointer;
    font-family: 'Fraunces', serif;
    flex-shrink: 0;
    padding: 0;
  }
  .add-btn:active { background: #c4604a; }

  footer {
    text-align: center;
    margin-top: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #a89e8c;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="date-label" id="date-label"></div>
      <h1>Calorie Log</h1>
    </div>
    <button class="reset-btn" id="reset-btn">reset</button>
  </header>

  <section class="summary">
    <div class="summary-row">
      <div>
        <span class="big-num" id="day-total">0</span><span class="slash-goal">/ 1200</span>
      </div>
      <div class="remaining-box">
        <div class="remaining-label" id="remaining-label">remaining</div>
        <div class="remaining-num" id="remaining-num">1200</div>
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
  </section>

  <div class="meal-list" id="meal-list"></div>

  <footer>tap an entry to remove · saves automatically</footer>
</div>

<script>
  const GOAL = 1200;
  const MEALS = ['Breakfast', 'Lunch', 'Dinner', 'Snacks'];

  const todayKey = () => {
    const d = new Date();
    return `calorie-log:${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const todayLabel = () => new Date().toLocaleDateString(undefined, {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  let entries = { Breakfast: [], Lunch: [], Dinner: [], Snacks: [] };

  function load() {
    try {
      const raw = localStorage.getItem(todayKey());
      if (raw) {
        const parsed = JSON.parse(raw);
        MEALS.forEach(m => { entries[m] = Array.isArray(parsed[m]) ? parsed[m] : []; });
      }
    } catch (e) { /* ignore */ }
  }
  function save() {
    try { localStorage.setItem(todayKey(), JSON.stringify(entries)); }
    catch (e) { /* ignore */ }
  }

  function mealTotal(m) { return entries[m].reduce((a,b) => a+b, 0); }

  function render() {
    document.getElementById('date-label').textContent = todayLabel();

    const total = MEALS.reduce((s,m) => s + mealTotal(m), 0);
    const remaining = GOAL - total;
    const over = total > GOAL;
    const pct = Math.min(100, (total / GOAL) * 100);

    const dayTotalEl = document.getElementById('day-total');
    dayTotalEl.textContent = total;
    dayTotalEl.classList.toggle('over', over);

    document.getElementById('remaining-label').textContent = over ? 'over by' : 'remaining';
    const remEl = document.getElementById('remaining-num');
    remEl.textContent = Math.abs(remaining);
    remEl.classList.toggle('over', over);

    const bar = document.getElementById('bar-fill');
    bar.style.width = pct + '%';
    bar.classList.toggle('over', over);

    const list = document.getElementById('meal-list');
    list.innerHTML = '';
    MEALS.forEach(meal => {
      const card = document.createElement('div');
      card.className = 'meal-card';

      const chips = entries[meal].map((cal, i) =>
        `<div class="entry-chip" data-meal="${meal}" data-idx="${i}">${cal}<span class="x">×</span></div>`
      ).join('');

      card.innerHTML = `
        <div class="meal-header">
          <h2 class="meal-name">${meal}</h2>
          <div class="meal-total">${mealTotal(meal)}</div>
        </div>
        <div class="entries-row">${chips}</div>
        <div class="input-row">
          <input class="meal-input" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="add calories" data-meal="${meal}">
          <button class="add-btn" data-meal="${meal}">+</button>
        </div>
      `;
      list.appendChild(card);
    });

    // Wire up handlers
    list.querySelectorAll('.entry-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const meal = chip.dataset.meal;
        const idx = parseInt(chip.dataset.idx, 10);
        entries[meal].splice(idx, 1);
        save();
        render();
      });
    });
    list.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', () => addFromInput(btn.dataset.meal));
    });
    list.querySelectorAll('.meal-input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addFromInput(input.dataset.meal);
          input.blur();
        }
      });
    });
  }

  function addFromInput(meal) {
    const input = document.querySelector(`.meal-input[data-meal="${meal}"]`);
    const val = parseInt(input.value, 10);
    if (isNaN(val) || val <= 0) return;
    entries[meal].push(val);
    input.value = '';
    save();
    render();
  }

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (confirm('Clear all entries for today?')) {
      entries = { Breakfast: [], Lunch: [], Dinner: [], Snacks: [] };
      save();
      render();
    }
  });

  load();
  render();
</script>
</body>
</html>
